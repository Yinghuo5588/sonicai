version: '3'

services:
  sonicai-backend:
    image: yinghuo5588/sonicai-backend:latest
    container_name: sonicai
    restart: always
    ports:
      - "8768:8000"
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/musicrec"
      REDIS_URL: "redis://redis:6379/3"
      REDIS_KEY_PREFIX: sonicai
      INIT_ADMIN_USERNAME: admin
      INIT_ADMIN_PASSWORD: change_me_after_deploy
      INIT_ADMIN_EMAIL: admin@sonicai.local
      JWT_SECRET_KEY: sonicai-access-change-in-production
      JWT_REFRESH_SECRET_KEY: sonicai-refresh-change-in-production
      APP_TIMEZONE: Asia/Shanghai
    networks:
      - console_default
    command:
      - python
      - run.py

  sonicai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: yinghuo5588/sonicai-frontend:latest
    container_name: sonicai-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - sonicai-backend
    networks:
      - console_default

networks:
  console_default:
    external: true
